<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>@GEUTAX PS2 Legacy</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.5s; }
        .bar-container { width: 250px; height: 2px; background: #111; margin-top: 20px; border-radius: 10px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #0f0; transition: width 0.3s; }
        #main-ui { opacity: 0; transition: opacity 1s; display: flex; flex-direction: column; align-items: center; width: 100%; }
        canvas { width: 95vw; max-width: 640px; aspect-ratio: 4/3; background: #000; border: 1px solid #333; }
        .btn { margin-top: 20px; padding: 15px 30px; background: none; border: 1px solid #0f0; color: #0f0; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loader">
        <div id="status">ФИНАЛЬНЫЙ ОБХОД @GEUTAX...</div>
        <div class="bar-container"><div id="progress-bar"></div></div>
        <div id="percent" style="margin-top: 10px;">0%</div>
    </div>

    <div id="main-ui">
        <div style="margin-bottom: 10px; opacity: 0.5;">@GEUTAX PS2 ENGINE</div>
        <canvas id="playCanvas"></canvas>
        <button id="biosBtn" class="btn" onclick="document.getElementById('biosFile').click()" disabled>ЗАГРУЗКА...</button>
    </div>

    <input type="file" id="biosFile" style="display:none" accept=".bin">

    <script type="module">
        import Play from './Play.js';

        const statusMsg = document.getElementById('status');
        
        const moduleConfig = {
            canvas: document.getElementById('playCanvas'),
            
            // ПЕРЕХВАТ ОШИБКИ: Подменяем IDBFS на MEMFS до запуска
            preRun: [function(mod) {
                console.log("[SYSTEM]: Kill IDBFS, using Virtual RAM only");
                // Создаем виртуальные пути, которые ищет эмулятор
                mod.FS.mkdir('/data');
                mod.FS.mkdir('/data/play');
                // Маскируем IDBFS под обычную память, чтобы insertSync не падал
                mod.FS.mount(mod.FS.filesystems.MEMFS, {}, '/data/play');
            }],

            arguments: ["--no-threads", "--no-audio"],

            instantiateWasm: function(imports, successCallback) {
                fetch('./Play.wasm')
                    .then(res => res.arrayBuffer())
                    .then(bytes => WebAssembly.instantiate(bytes, imports))
                    .then(results => {
                        console.log("[SYSTEM]: WASM OK");
                        // Увеличиваем задержку для мобильного Chrome
                        setTimeout(() => successCallback(results.instance), 300);
                    })
                    .catch(e => { statusMsg.innerText = "WASM FAIL"; });
                return {};
            },

            setStatus: (text) => {
                const match = text.match(/([0-9\.]+)%/);
                if (match) {
                    document.getElementById('progress-bar').style.width = match[1] + '%';
                    document.getElementById('percent').innerText = Math.round(match[1]) + '%';
                }
            },

            onRuntimeInitialized: function() {
                document.getElementById('loader').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('loader').style.display = "none";
                    document.getElementById('main-ui').style.opacity = "1";
                    document.getElementById('biosBtn').disabled = false;
                    document.getElementById('biosBtn').innerText = "ВЫБРАТЬ BIOS";
                }, 500);
            }
        };

        // Запуск
        try {
            Play(moduleConfig).then(m => { window.Module = m; });
        } catch(e) {
            statusMsg.innerText = "HALT";
        }

        // BIOS
        document.getElementById('biosFile').onchange = (e) => {
            const file = e.target.files[0];
            if (!file || !window.Module?.FS) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = new Uint8Array(ev.target.result);
                // Пишем прямо в корень MEMFS
                window.Module.FS.writeFile('/bios.bin', data);
                if (window.Module.setOption) {
                    window.Module.setOption("Play", "BiosPath", "/bios.bin");
                    window.Module.setOption("Play", "EnableHle", false);
                }
                alert("BIOS OK!");
            };
            reader.readAsArrayBuffer(file);
        };
    </script>
</body>
</html>
